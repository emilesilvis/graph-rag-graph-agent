  expected_answer: 6 - the Auth Service, PII Service, Data Lineage Service, Fraud Detection Service, Recommendation Service, and the Monolithic Django App.
  expected_entities:
    - "6"
    - Auth Service
    - PII Service
    - Data Lineage Service
    - Fraud Detection Service
    - Recommendation Service
    - Monolithic Django App
  seed_cypher: |
    MATCH (s:Entity)-[r]->(:Entity {name: 'Python'})
