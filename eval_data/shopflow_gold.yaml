- id: gold-028
  category: negation
  question: Among the services managed by the Platform Team, which ones are NOT implemented in Python?
  expected_answer: The GraphQL Service is not documented as being implemented in Python (the Auth Service and PII Service both are).
  expected_entities:
    - GraphQL Service
  seed_cypher: |
    MATCH (:Entity {name: 'Platform Team'})-[:MANAGES]->(s:Entity)
    WITH s
    WHERE NOT EXISTS {
      MATCH (s)-[r]->(:Entity {name: 'Python'})
      WHERE type(r) IN ['IS_BUILT_WITH','IS_DEVELOPED_IN','IS_IMPLEMENTED_IN','BUILT_USING','IS_WRITTEN_IN']
    }
    RETURN s.name
  seed_description: Platform Team MANAGES {Auth Service, GraphQL Service, PII Service}; Auth and PII are Python; GraphQL Service has no Python edge (it is JavaScript per MD)

- id: gold-029
  category: negation
  question: Among the services that depend on the Data Lineage Service, which are NOT managed by the Platform Team?
  expected_answer: The Payments Service and the Monolithic Django App depend on the Data Lineage Service but are not managed by the Platform Team.
  expected_entities:
    - Payments Service
    - Monolithic Django App
  seed_cypher: |
    MATCH (s:Entity)-[:DEPENDS_ON]->(:Entity {name: 'Data Lineage Service'})
    WITH DISTINCT s
    WHERE NOT (:Entity {name: 'Platform Team'})-[:MANAGES]->(s)
    RETURN s.name
  seed_description: Of {Auth Service, Payments Service, Monolithic Django App} that DEPENDS_ON Data Lineage Service, only Auth Service is Platform-managed

- id: gold-030
  category: negation
  question: Among the services implemented in Python, which ones are NOT managed by the Platform Team?
  expected_answer: The Data Lineage Service, the Fraud Detection Service, the Recommendation Service, and the Monolithic Django App are implemented in Python but not managed by the Platform Team.
  expected_entities:
    - Data Lineage Service
    - Fraud Detection Service
    - Recommendation Service
    - Monolithic Django App
  seed_cypher: |
    MATCH (s:Entity)-[r]->(:Entity {name: 'Python'})
    WHERE type(r) IN ['IS_BUILT_WITH','IS_DEVELOPED_IN','IS_IMPLEMENTED_IN','BUILT_USING','IS_WRITTEN_IN']
    WITH DISTINCT s
    WHERE NOT (:Entity {name: 'Platform Team'})-[:MANAGES]->(s)
    RETURN s.name
  seed_description: Python-implementers minus Platform-managed services (tests set subtraction on a union of rel-type spellings - the core negation recipe)
