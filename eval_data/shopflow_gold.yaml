- id: gold-025
  category: aggregation_count
  question: How many teams does the ShopFlow platform have?
  expected_answer: ShopFlow has 9 teams - Catalog, Customer Experience, Data, Engineering, Logistics, Orders, Platform, Product, and the Site Reliability Engineering (SRE) Team.
  expected_entities:
    - "9"
    - Catalog Team
    - Customer Experience Team
    - Data Team
    - Engineering Team
    - Logistics Team
    - Orders Team
    - Platform Team
    - Product Team
    - Site Reliability Engineering (SRE) Team
  seed_cypher: |
    MATCH (:Entity {name: 'ShopFlow'})-[:HAS_TEAM]->(t:Entity)
    RETURN count(DISTINCT t) AS count, collect(t.name) AS teams
  seed_description: ShopFlow HAS_TEAM (9 teams)

