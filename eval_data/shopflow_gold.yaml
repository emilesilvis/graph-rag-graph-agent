- id: gold-021
  category: dependency_chain
  question: >-
    Which services use Redis for caching or session storage? Consider all
    relationship types that express use/employ/cache.
  expected_answer: The Auth Service and the Payments Service both use Redis for caching.
  expected_entities:
    - Auth Service
    - Payments Service
  seed_cypher: |
    MATCH (:Entity {name: 'Redis'})-[:IS_USED_BY]->(s:Entity)
    RETURN DISTINCT s.name
    UNION
    MATCH (s:Entity)-[r]->(:Entity {name: 'Redis'})
    WHERE type(r) IN ['USES_DATABASE','EMPLOYS','CACHES','UTILIZES']
    RETURN DISTINCT s.name
  seed_description: Redis IS_USED_BY {Auth Service, Payments Service}; also Auth Service USES_DATABASE Redis; Payments Service EMPLOYS Redis (tests rel-type unioning on both edge directions)

